<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>IA Nutri</title>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="card">
            <h1>IA <span>Nutri</span></h1>
            <p>Seu plano alimentar inteligente</p>
            
            <div class="mensagens" id="chat-box">
                <div class="msg-ia">Olá! Sou sua IA Nutri. Como posso ajudar com sua dieta hoje?</div>
            </div>
            
            <div id="area-salvar" style="display:none; margin-bottom: 15px;">
                <button onclick="salvarNutri()" class="btn-primary" style="background: #22C55E;">SALVAR ESTA RESPOSTA ✅</button>
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="pergunta" placeholder="Ex: Me dê opções de café da manhã..." onkeypress="if(event.key === 'Enter') perguntarNutri()">
                <button onclick="perguntarNutri()" class="btn-primary" style="width: 100px;">IR</button>
            </div>
            
            <div class="link-area">
                <a href="{{ url_for('dashboard') }}">Voltar ao Painel</a>
            </div>
        </div>
    </div>

    <script>
        let ultimaRespostaGerada = "";

        async function perguntarNutri() {
            const input = document.getElementById('pergunta');
            const pergunta = input.value.trim();
            if(!pergunta) return;

            const chatBox = document.getElementById('chat-box');
            
            // Adiciona a pergunta do usuário
            chatBox.innerHTML += `<div class="msg-user">${pergunta}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Mensagem de carregamento
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div class="msg-ia" id="${loadingId}" style="opacity: 0.7;">A Nutri está digitando... ⏳</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("/nutri/pergunta", {
                    method: 'POST',
                    body: new URLSearchParams({'pergunta': pergunta})
                });
                
                // Remove o carregamento
                document.getElementById(loadingId).remove();

                if (!response.ok) {
                    throw new Error("Erro no servidor do Python");
                }

                const data = await response.json();
                
                ultimaRespostaGerada = data.resposta;
                chatBox.innerHTML += `<div class="msg-ia">${data.resposta.replace(/\n/g, '<br>')}</div>`;
                document.getElementById('area-salvar').style.display = "block";
                chatBox.scrollTop = chatBox.scrollHeight;
                
            } catch (error) {
                document.getElementById(loadingId)?.remove();
                chatBox.innerHTML += `<div class="msg-ia" style="color: #FF3131;">Erro de conexão. Olhe o terminal do VS Code!</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        async function salvarNutri() {
            const response = await fetch("/nutri/salvar", {
                method: 'POST',
                body: new URLSearchParams({'conteudo': ultimaRespostaGerada})
            });
            if(response.ok) {
                alert("Dica da Nutri salva com sucesso!");
                document.getElementById('area-salvar').style.display = "none";
            } else {
                alert("Erro ao salvar.");
            }
        }
    </script>
</body>
</html>
