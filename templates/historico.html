<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Meus Treinos</title>
    <style>
        .treino-card {
            background: #2A2A2A;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
            border: 1px solid #444;
        }
        .treino-data {
            font-size: 12px;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: bold;
        }
        .treino-conteudo {
            font-size: 14px;
            line-height: 1.5;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="card">
            <h1>Meus <span>Treinos</span></h1>
            <p>Seu histórico salvo</p>

            <div style="max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
                {% if treinos %}
                    {% for treino in treinos %}
                    <div class="treino-card">
                        <div class="treino-data">Salvo em: {{ treino.created_at[:10] }}</div>
                        <div class="treino-conteudo">
                            {{ treino.conteudo | replace('\n', '<br>') | safe }}
                        </div>
                    </div>
                    {% endfor %}
                {% else %}
                    <p style="color: #888;">Você ainda não tem treinos salvos.</p>
                {% endif %}
            </div>

            <div class="link-area">
                <a href="{{ url_for('dashboard') }}">Voltar ao Painel</a>
            </div>
        </div>
    </div>
</body>
</html>
